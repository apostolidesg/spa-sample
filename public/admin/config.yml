backend:
  name: github
  repo: apostolidesg/spa-sample
  branch: develop

local_backend: true

media_folder: "public/assets/images"
public_folder: "/assets/images"

collections:
  - name: "common_en"
    label: "Common (EN) - Navbar & Footer"
    folder: "content/en"
    create: false
    delete: false
    slug: "common"
    filter: {field: "file_name", value: "common"}
    identifier_field: "file_name"
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "common"}
      - label: "Navbar"
        name: "navbar"
        widget: "object"
        fields:
          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
          - label: "Routes"
            name: "routes"
            widget: "object"
            fields:
              - {label: "Home", name: "home", widget: "string"}
              - {label: "About", name: "about", widget: "string"}
              - {label: "Services", name: "services", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}
              - {label: "Services & Contact", name: "servicesAndContact", widget: "string"}
          - {label: "Language Toggle", name: "language", widget: "string"}
      - label: "Footer"
        name: "footer"
        widget: "object"
        fields:
          - {label: "Copyright Text", name: "copyrights", widget: "string"}

  - name: "common_el"
    label: "Common (EL) - Navbar & Footer"
    folder: "content/el"
    create: false
    delete: false
    slug: "common"
    filter: {field: "file_name", value: "common"}
    identifier_field: "file_name"
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "common"}
      - label: "Navbar"
        name: "navbar"
        widget: "object"
        fields:
          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
          - label: "Routes"
            name: "routes"
            widget: "object"
            fields:
              - {label: "Home", name: "home", widget: "string"}
              - {label: "About", name: "about", widget: "string"}
              - {label: "Services", name: "services", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}
              - {label: "Services & Contact", name: "servicesAndContact", widget: "string"}
          - {label: "Language Toggle", name: "language", widget: "string"}
      - label: "Footer"
        name: "footer"
        widget: "object"
        fields:
          - {label: "Copyright Text", name: "copyrights", widget: "string"}

  - name: "home_en"
    label: "Home Page (EN)"
    folder: "content/en"
    create: false
    delete: false
    slug: "home"
    filter: {field: "file_name", value: "home"}
    identifier_field: "file_name"
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "home"}
      - label: "Hero Section"
        name: "hero"
        widget: "object"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Button Text", name: "buttonText", widget: "string"}
      - label: "About Section"
        name: "about"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - label: "Services Section"
        name: "services"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - label: "Contact Section"
        name: "contact"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}

  - name: "home_el"
    label: "Home Page (EL)"
    folder: "content/el"
    create: false
    delete: false
    slug: "home"
    filter: {field: "file_name", value: "home"}
    identifier_field: "file_name"
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "home"}
      - label: "Hero Section"
        name: "hero"
        widget: "object"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Button Text", name: "buttonText", widget: "string"}
      - label: "About Section"
        name: "about"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - label: "Services Section"
        name: "services"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - label: "Contact Section"
        name: "contact"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
