backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "common-el"
    label: "Menu (GR)"
    folder: "content/common/el"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: file_name
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "common"}
      - label: "Navbar"
        name: "navbar"
        widget: "object"
        fields:
          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
          - label: "Routes"
            name: "routes"
            widget: "object"
            fields:
              - {label: "Home", name: "home", widget: "string"}
              - {label: "About", name: "about", widget: "string"}
              - {label: "Services", name: "services", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}
              - {label: "Services & Contact", name: "servicesAndContact", widget: "string"}
          - {label: "Language Toggle", name: "language", widget: "string"}

  - name: "common-en"
    label: "Menu (EN)"
    folder: "content/common/en"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: file_name
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "common"}
      - label: "Navbar"
        name: "navbar"
        widget: "object"
        fields:
          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
          - label: "Routes"
            name: "routes"
            widget: "object"
            fields:
              - {label: "Home", name: "home", widget: "string"}
              - {label: "About", name: "about", widget: "string"}
              - {label: "Services", name: "services", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}
              - {label: "Services & Contact", name: "servicesAndContact", widget: "string"}
          - {label: "Language Toggle", name: "language", widget: "string"}

  - name: "home-el"
    label: "Home Page (GR)"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/home/el/hero.json"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Button Text", name: "buttonText", widget: "string"}
      - name: "about-section"
        label: "About Section"
        file: "content/home/el/about.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - name: "services-section"
        label: "Services Section"
        file: "content/home/el/services.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - name: "contact-section"
        label: "Contact Section"
        file: "content/home/el/contact.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}

  - name: "home-en"
    label: "Home Page (EN)"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/home/en/hero.json"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Button Text", name: "buttonText", widget: "string"}
      - name: "about-section"
