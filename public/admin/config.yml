backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

i18n:
  structure: multiple_folders
  locales: [en, el]
  default_locale: el

collections:
  - name: "common"
    label: "Navbar & Footer"
    folder: "content"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: "file_name"
    filter: {field: "file_name", value: "common"}
    i18n: true
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "common", i18n: duplicate}
      - label: "Navbar"
        name: "navbar"
        widget: "object"
        fields:
          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
          - label: "Routes"
            name: "routes"
            widget: "object"
            fields:
              - {label: "Home", name: "home", widget: "string"}
              - {label: "About", name: "about", widget: "string"}
              - {label: "Services", name: "services", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}
              - {label: "Services & Contact", name: "servicesAndContact", widget: "string"}
          - {label: "Language Toggle", name: "language", widget: "string"}
      - label: "Footer"
        name: "footer"
        widget: "object"
        fields:
          - {label: "Copyright Text", name: "copyrights", widget: "string"}

  - name: "home"
    label: "Home Page"
    folder: "content"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: "file_name"
    filter: {field: "file_name", value: "home"}
    i18n: true
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "home", i18n: duplicate}
      - label: "Hero Section"
        name: "hero"
        widget: "object"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Button Text", name: "buttonText", widget: "string"}
      - label: "About Section"
        name: "about"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - label: "Services Section"
        name: "services"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - label: "Contact Section"
        name: "contact"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}

  - name: "about"
    label: "About Page"
    folder: "content"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: "file_name"
    filter: {field: "file_name", value: "about"}
    i18n: true
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "about", i18n: duplicate}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image Alt Text", name: "imageAlt", widget: "string"}
      - label: "Hero"
        name: "hero"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - label: "Education"
        name: "education"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Image Alt", name: "imageAlt", widget: "string"}
          - label: "Education Items"
            name: "items"
            widget: "list"
            field: {label: "Item", name: "item", widget: "text"}
      - label: "FAQ"
        name: "faq"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - label: "FAQ Items"
            name: "items"
            widget: "list"
            fields:
              - {label: "Question", name: "question", widget: "string"}
              - {label: "Answer", name: "answer", widget: "text"}

  - name: "services"
    label: "Services Page"
    folder: "content"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: "file_name"
    filter: {field: "file_name", value: "services"}
    i18n: true
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "services", i18n: duplicate}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Read More Text", name: "readMore", widget: "string"}
      - label: "Hero"
        name: "hero"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - label: "Service Items"
        name: "items"
        widget: "list"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "content", widget: "text"}
          - {label: "Duration", name: "duration", widget: "string"}
          - {label: "Price", name: "price", widget: "string"}
      - label: "Testimonials"
        name: "testimonials"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - label: "Testimonial Items"
            name: "items"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Content", name: "content", widget: "text"}

  - name: "servicesContact"
    label: "Services & Contact Page"
    folder: "content"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: "file_name"
    filter: {field: "file_name", value: "servicesContact"}
    i18n: true
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "servicesContact", i18n: duplicate}
      - label: "Hero"
        name: "hero"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}

  - name: "contact"
    label: "Contact Page"
    folder: "content"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: "file_name"
    filter: {field: "file_name", value: "contact"}
    i18n: true
    fields:
      - {label: "File Name", name: "file_name", widget: "hidden", default: "contact", i18n: duplicate}
      - label: "Hero"
        name: "hero"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
      - {label: "Info Label", name: "info", widget: "string"}
      - label: "Working Hours"
        name: "workingHours"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Weekdays", name: "weekdays", widget: "string"}
          - {label: "Saturday", name: "saturday", widget: "string"}
          - {label: "Sunday", name: "sunday", widget: "string"}
      - label: "Practice Locations"
        name: "practiceLocations"
        widget: "object"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - label: "Locations"
            name: "locations"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Street", name: "street", widget: "string"}
              - {label: "City", name: "city", widget: "string"}
              - {label: "Email", name: "email", widget: "string"}
              - {label: "Phone", name: "tel", widget: "string"}
              - {label: "Fax", name: "fax", widget: "string"}
              - {label: "Instagram URL", name: "instagram", widget: "string"}
              - {label: "Instagram Label", name: "instagramLabel", widget: "string"}
              - {label: "Facebook URL", name: "facebook", widget: "string"}
              - {label: "Facebook Label", name: "facebookLabel", widget: "string"}
      - label: "Contact Form"
        name: "form"
        widget: "object"
        fields:
          - {label: "First Name", name: "firstName", widget: "string"}
          - {label: "Last Name", name: "lastName", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Submit Button", name: "cta", widget: "string"}
